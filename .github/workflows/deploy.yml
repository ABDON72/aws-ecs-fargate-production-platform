name: Deploy to AWS ECS

on:
  push:
    branches:
      - gitops

env:
  AWS_REGION: us-east-1
  ECR_BACKEND: 795644302799.dkr.ecr.us-east-1.amazonaws.com/ecs-fargate-cicd-backend
  ECR_FRONTEND: 795644302799.dkr.ecr.us-east-1.amazonaws.com/ecs-fargate-cicd-frontend
  ECS_CLUSTER: ecs-fargate-cicd-cluster
  BACKEND_SERVICE: ecs-fargate-cicd-backend-service
  FRONTEND_SERVICE: ecs-fargate-cicd-frontend-service

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push backend image
        run: |
          docker build -t $ECR_BACKEND:latest ./backend
          docker push $ECR_BACKEND:latest

      - name: Build and push frontend image
        run: |
          docker build -t $ECR_FRONTEND:latest ./frontend
          docker push $ECR_FRONTEND:latest

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $BACKEND_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $FRONTEND_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Verify deployment
        run: |
          echo "Waiting for services to stabilize..."
          sleep 60
          STATUS_B=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $BACKEND_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].deployments[0].rolloutState' \
            --output text)
          STATUS_F=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $FRONTEND_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].deployments[0].rolloutState' \
            --output text)
          echo "Backend: $STATUS_B"
          echo "Frontend: $STATUS_F"
          echo "Deployment complete!"
